<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Premium Card Design Animation Sequence">
<title>Premium Card Animation</title>

<style>
:root {
    --cyan: #7df9ff;
    --muted-white: rgba(255, 255, 255, 0.7);
    --adv-color: #4ade80;
    --disadv-color: #f87171;
    --red-brand: #ff3333;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: radial-gradient(circle at center, #1f1f23 0%, #09090a 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.global-brand {
    position: fixed;
    top: 35px;
    left: 50%;
    transform: translateX(-50%) translateZ(0); /* GPU Acceleration */
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 1001;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8);
    pointer-events: none;
    will-change: transform;
}

.global-brand .red-text { color: var(--red-brand); }
.global-brand .white-text { color: #ffffff; }

.vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.5) 80%, rgba(0,0,0,0.9) 100%);
    z-index: 10;
}

.intermezzo {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    will-change: opacity;
}

.inter-content {
    position: relative;
    z-index: 501;
    text-align: center;
    opacity: 0;
    will-change: transform, opacity, filter;
}

.inter-content.epic-anim {
    animation: epicSequence 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}

@keyframes epicSequence {
    0% { transform: scale3d(0.4, 0.4, 1); opacity: 0; filter: blur(15px); }
    20% { transform: scale3d(0.85, 0.85, 1); opacity: 1; filter: blur(0px); }
    80% { transform: scale3d(0.95, 0.95, 1); opacity: 1; filter: blur(0px); }
    100% { transform: scale3d(1.4, 1.4, 1); opacity: 0; filter: blur(12px); }
}

.inter-title {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 5px 25px rgba(0,0,0,0.9);
}
.inter-title .red-text { color: var(--red-brand); }
.inter-title .white-text { color: #ffffff; }

.inter-subtitle {
    color: #e0e0e0;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 10px;
    margin-top: 15px;
    text-transform: uppercase;
    text-shadow: 0 3px 15px rgba(0,0,0,0.9);
}

.scale-container {
    display: flex;
    justify-content: center;
    align-items: center;
    transform-origin: center center;
    transition: transform 0.2s ease-out;
    position: relative;
    top: -15vh;
    will-change: transform;
}

.wrapper {
    position: relative;
    width: 1000px;
    height: 1000px;
    transform-origin: center;
    will-change: transform, opacity;
}

.card {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate3d(-50%, -50%, 0) scale3d(0, 0, 1); /* 3D Transform for GPU */
    width: 560px;
    height: 400px;
    border-radius: 28px;
    background: linear-gradient(145deg, #ffffff 0%, #f4f4f4 35%, #e0e0e0 70%, #fdfdfd 100%);
    opacity: 0;
    box-shadow: 
        0 40px 90px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,1),
        inset 0 -1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
    will-change: transform, opacity, width, height;
}

.stroke {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 592px;
    height: 432px;
    border-radius: 34px;
    border: 2px solid rgba(255, 255, 255, 0.4);
    transform: translate3d(-50%, -50%, 0) scale3d(0.95, 0.95, 1);
    opacity: 0;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    will-change: transform, opacity;
}

.card-content {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
    will-change: opacity;
}

.card-info {
    position: absolute;
    left: 45px;
    top: 50%;
    transform: translateY(-50%) translateZ(0);
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: all 1.5s cubic-bezier(.22,1,.36,1);
    color: #333;
    width: calc(100% - 210px);
    will-change: transform, left, top, width;
}

.info-row {
    font-size: 18px;
    letter-spacing: 0.5px;
}

.info-row.name {
    font-size: 28px;
    color: #111;
    margin-bottom: 6px;
    letter-spacing: 1px;
}

.info-row strong {
    font-weight: 600;
    color: #111;
}

.card-qr {
    position: absolute;
    right: 45px;
    top: 50%;
    transform: translateY(-50%) translateZ(0);
    width: 140px;
    height: 140px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 0 0 2px rgba(0,0,0,0.05);
    transition: all 1.5s cubic-bezier(.22,1,.36,1);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    will-change: transform, right, top, width, height;
}

.card.is-portrait .card-info {
    left: 50%;
    top: 72%;
    transform: translate(-50%, -50%) translateZ(0);
    text-align: center;
    align-items: center;
    width: 90%;
}

.card.is-portrait .card-qr {
    right: 50%;
    top: 30%;
    transform: translate(50%, -50%) translateZ(0);
    width: 170px;
    height: 170px;
}

.title {
    position: absolute;
    left: 50%;
    top: 760px;
    transform: translateX(-50%) translateZ(0);
    color: #ffffff;
    letter-spacing: 12px;
    font-size: 32px; 
    font-weight: 300;
    opacity: 0;
    text-transform: uppercase;
    text-shadow: 0 4px 15px rgba(0,0,0,0.9);
    transition: opacity 0.6s ease, top 1.5s cubic-bezier(.22,1,.36,1);
    white-space: nowrap;
    will-change: opacity, top;
}

.description {
    position: absolute;
    left: 50%;
    top: 820px;
    transform: translateX(-50%) translateZ(0);
    color: var(--muted-white);
    font-size: 24px; 
    font-weight: 300;
    letter-spacing: 1px;
    text-align: center;
    opacity: 0;
    width: 840px;
    line-height: 1.8;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    transition: opacity 0.6s ease, top 1.5s cubic-bezier(.22,1,.36,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: opacity, top;
}

.desc-line {
    margin-bottom: 12px;
}

.adv { color: var(--adv-color); font-weight: 600; margin-right: 12px; letter-spacing: 2px;}
.disadv { color: var(--disadv-color); font-weight: 600; margin-right: 12px; letter-spacing: 2px;}

.measure {
    position: absolute;
    opacity: 0;
    transition: opacity 0.6s;
    z-index: 5;
    will-change: opacity, left, top;
}

.h-line {
    height: 2px;
    background: var(--cyan);
    transform-origin: center;
    transform: scaleX(0) translateZ(0);
    will-change: transform, width;
}

.v-line {
    width: 2px;
    background: var(--cyan);
    transform-origin: center;
    transform: scaleY(0) translateZ(0);
    will-change: transform, height;
}

.label {
    position: absolute;
    color: var(--cyan);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    white-space: nowrap;
    will-change: transform;
}

.footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px 32px;
    gap: 50px;
    z-index: 1000;
    box-shadow: 0 -6px 40px rgba(0,0,0,0.5); 
    transform: translateZ(0);
}

.footer-link {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #111;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    opacity: 0.7;
    transition: all 0.2s ease;
    will-change: transform, opacity;
}

.footer-link:hover {
    opacity: 1;
    transform: translateY(-2px);
    color: #000;
}

.footer-link svg {
    transition: transform 0.2s ease;
    width: 26px; 
    height: 26px;
    will-change: transform;
}

.footer-link:hover svg {
    transform: scale3d(1.1, 1.1, 1);
}

@media (max-width: 600px) {
    .footer-bar {
        padding: 18px 20px;
        gap: 24px;
        flex-wrap: wrap;
    }
    .footer-link {
        font-size: 14px;
        gap: 8px;
    }
    .footer-link svg {
        width: 22px;
        height: 22px;
    }
    .inter-title { font-size: 48px; }
    .inter-subtitle { font-size: 16px; }
}
</style>
</head>
<body>

<div class="global-brand">
    <span class="red-text">Red</span> <span class="white-text">Design</span>
</div>

<div class="vignette"></div>

<!-- Intermezzo Overlay Sequence -->
<div class="intermezzo" id="intermezzo">
    <div class="inter-content" id="interContent">
        <div class="inter-title">
            <span class="red-text">Red</span> <span class="white-text">Design</span>
        </div>
        <div class="inter-subtitle">Pocket Size adjust</div>

</div>

<div class="scale-container" id="scaleContainer">
    <div class="wrapper" id="wrapper">
        <div class="stroke" id="stroke"></div>
        <div class="card" id="card">
            <div class="card-content" id="cardContent">
                <div class="card-info">
                    <div class="info-row name"><strong>Name:</strong> Tony Stark</div>

</div>

<script>
const card = document.getElementById("card");
const cardContent = document.getElementById("cardContent");
const stroke = document.getElementById("stroke");
const title = document.getElementById("title");
const description = document.getElementById("description");
const hLine = document.getElementById("hLine");
const vLine = document.getElementById("vLine");
const widthMeasure = document.getElementById("widthMeasure");
const heightMeasure = document.getElementById("heightMeasure");
const widthLabel = document.getElementById("widthLabel");
const heightLabel = document.getElementById("heightLabel");
const wrapper = document.getElementById("wrapper");
const scaleContainer = document.getElementById("scaleContainer");
const intermezzo = document.getElementById('intermezzo');
const interContent = document.getElementById('interContent');

let currentCardWidth = 560;
let currentCardHeight = 400;
let resizeFrame;

function wait(ms){
    return new Promise(r => setTimeout(r, ms));
}

function updateScale() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    
    let scale = Math.min((screenWidth * 0.95) / 1000, (screenHeight * 0.80) / 1000, 1.2);
    
    if (screenWidth <= 600) {
        scale = Math.min((screenWidth * 0.95) / 860, (screenHeight * 0.80) / 1000);
    }
    
    // Use scale3d for hardware acceleration
    scaleContainer.style.transform = `scale3d(${scale}, ${scale}, 1)`;
}

function updateMeasurements(){
    const wrapW = 1000;
    const wrapH = 1000;
    
    const leftOffset = (wrapW - currentCardWidth) / 2;
    const topOffset = (wrapH - currentCardHeight) / 2;

    widthMeasure.style.left = leftOffset + "px";
    widthMeasure.style.top = (topOffset - 60) + "px";
    hLine.style.width = currentCardWidth + "px";

    widthLabel.style.left = "50%";
    widthLabel.style.top = "-40px";
    widthLabel.style.transform = "translateX(-50%) translateZ(0)";

    heightMeasure.style.left = (leftOffset - 60) + "px";
    heightMeasure.style.top = topOffset + "px";
    vLine.style.height = currentCardHeight + "px";

    heightLabel.style.left = "-20px";
    heightLabel.style.top = "50%";
    heightLabel.style.transform = "translate(-100%, -50%) rotate(-90deg) translateZ(0)";
}

function togglePortraitMode(isPortrait) {
    if (isPortrait) {
        card.classList.add('is-portrait');
        title.style.top = "800px";
        description.style.top = "860px";
    } else {
        card.classList.remove('is-portrait');
        title.style.top = "760px";
        description.style.top = "820px";
    }
}

async function showMeasure(w, h){
    updateMeasurements();
    widthLabel.innerHTML = w;
    heightLabel.innerHTML = h;
    widthMeasure.style.opacity = 1;
    heightMeasure.style.opacity = 1;
    await wait(50);
    hLine.style.transition = "1s cubic-bezier(.22,1,.36,1)";
    vLine.style.transition = "1s cubic-bezier(.22,1,.36,1)";
    hLine.style.transform = "scaleX(1) translateZ(0)";
    vLine.style.transform = "scaleY(1) translateZ(0)";
}

async function hideMeasure(){
    hLine.style.transform = "scaleX(0) translateZ(0)";
    vLine.style.transform = "scaleY(0) translateZ(0)";
    await wait(600);
    widthMeasure.style.opacity = 0;
    heightMeasure.style.opacity = 0;
}

async function showText(text, desc){
    title.innerHTML = text;
    description.innerHTML = desc;
    title.style.opacity = 1;
    description.style.opacity = 1;
}

async function hideText(){
    title.style.opacity = 0;
    description.style.opacity = 0;
}

async function resizeCard(w, h){
    currentCardWidth = w;
    currentCardHeight = h;
    card.style.width = w + "px";
    card.style.height = h + "px";
    await wait(1400);
    updateMeasurements();
}

// Epic 3-Second Cinematic Text Animation
function triggerEpicText() {
    return new Promise(resolve => {
        intermezzo.style.opacity = 1;
        interContent.classList.remove('epic-anim');
        void interContent.offsetWidth; // trigger DOM reflow to restart CSS animation (necessary evil)
        interContent.classList.add('epic-anim');

        setTimeout(() => {
            intermezzo.style.opacity = 0;
            resolve();
        }, 3000); 
    });
}

async function run(){
    while(true){
        wrapper.style.transition = "none";
        wrapper.style.opacity = 1;
        wrapper.style.transform = "scale3d(1, 1, 1)";

        currentCardWidth = 560;
        currentCardHeight = 400;

        card.style.transition = "none";
        card.style.width = "560px";
        card.style.height = "400px";
        card.style.opacity = 0;
        card.style.transform = "translate3d(-50%,-50%, 0) scale3d(0.2, 0.2, 1)";
        cardContent.style.opacity = 0;

        togglePortraitMode(false);

        stroke.style.opacity = 0;
        title.style.opacity = 0;
        description.style.opacity = 0;

        widthMeasure.style.opacity = 0;
        heightMeasure.style.opacity = 0;
        hLine.style.transform = "scaleX(0) translateZ(0)";
        vLine.style.transform = "scaleY(0) translateZ(0)";

        await wait(500);

        /* 1. ORIGINAL */
        card.style.transition = "all 1.4s cubic-bezier(.22,1,.36,1)";
        card.style.opacity = 1;
        card.style.transform = "translate3d(-50%,-50%, 0) scale3d(1, 1, 1)";
        
        await wait(800);
        cardContent.style.opacity = 1; 
        await wait(700);

        await showMeasure('3.5 Inch', '2.5 Inch');
        await showText(
            "ORIGINAL", 
            `<div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Too bulky to easily fit inside modern pockets or wallets</div>
             <div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Impractical and cumbersome for continuous daily carry</div>`
        );

        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        /* 2. LAMINATED */
        stroke.style.transition = "all 1.2s cubic-bezier(.22,1,.36,1)";
        stroke.style.opacity = 1;
        stroke.style.transform = "translate3d(-50%,-50%, 0) scale3d(1, 1, 1)";

        await wait(1200);

        await showMeasure('3.7 Inch', '2.7 Inch');
        await showText(
            "LAMINATED", 
            `<div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Significantly larger dimensions with rigid protective edges</div>
             <div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Exceptionally difficult to fit into standard compartments</div>`
        );

        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        stroke.style.opacity = 0;
        cardContent.style.opacity = 0;
        card.style.opacity = 0;
        
        await wait(800); 

        currentCardWidth = 480;
        currentCardHeight = 320;
        card.style.transition = "none";
        card.style.width = "480px";
        card.style.height = "320px";
        card.style.transform = "translate3d(-50%,-50%, 0) scale3d(0.85, 0.85, 1)"; 
        updateMeasurements();

        await triggerEpicText();

        card.style.transition = "all 1.5s cubic-bezier(.22,1,.36,1)";
        card.style.opacity = 1;
        card.style.transform = "translate3d(-50%,-50%, 0) scale3d(1, 1, 1)";
        
        await wait(1000);
        cardContent.style.opacity = 1;
        await wait(600);

        /* 4. POCKET LANDSCAPE */
        await showMeasure('3 Inch', '2 Inch');
        await showText(
            "POCKET LANDSCAPE", 
            `<div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Perfectly compact, lightweight, and balanced design</div>
             <div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Slips smoothly into any standard wallet or hand carry</div>`
        );
        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        /* 5. POCKET PORTRAIT */
        togglePortraitMode(true); 
        await resizeCard(320, 480);

        await showMeasure('2 Inch', '3 Inch');
        await showText(
            "POCKET PORTRAIT", 
            `<div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Incredibly sleek and ergonomic portrait orientation</div>
             <div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Fits flawlessly inside minimalist cardholders and small pockets</div>`
        );

        await wait(5000);

        await hideMeasure();
        await wait(500);
        await hideText();
        await wait(500);

        /* Cinematic fading exit */
        wrapper.style.transition = "all 2.5s cubic-bezier(.22,1,.36,1)";
        wrapper.style.transform = "scale3d(.35, .35, 1)";
        wrapper.style.opacity = 0;

        await wait(3000);
    }
}

// Optimized resize listener with requestAnimationFrame debounce
window.addEventListener("resize", () => {
    if (resizeFrame) cancelAnimationFrame(resizeFrame);
    resizeFrame = requestAnimationFrame(updateScale);
});

// Init
updateScale();
run();

</script>
