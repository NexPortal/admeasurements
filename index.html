<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Card Animation</title>

<style>
:root {
    --cyan: #7df9ff;
    --muted-white: rgba(255, 255, 255, 0.7);
    --adv-color: #4ade80;
    --disadv-color: #f87171;
    /* Adaptive typography multipliers controlled by JS scaling */
    --text-scale-multiplier: 1.0;
    --card-text-scale-multiplier: 1.0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: radial-gradient(circle at center, #1a1a1d 0%, #050506 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
}

.vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.6) 75%, rgba(0,0,0,0.95) 100%);
    z-index: 10;
}

.scale-container {
    display: flex;
    justify-content: center;
    align-items: center;
    transform-origin: center center;
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.wrapper {
    position: relative;
    width: 1000px;
    height: 850px; /* Increased height to provide elegant spacing below the card */
    transform-origin: center;
}

/* Elegant radial glow behind the active card */
.card-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: 560px;
    height: 400px;
    border-radius: 28px;
    background: radial-gradient(circle, rgba(125, 249, 255, 0.12) 0%, transparent 70%);
    filter: blur(45px);
    opacity: 0;
    z-index: 1;
    transition: all 1.4s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
}

.card {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 560px;
    height: 400px;
    border-radius: 28px;
    background: linear-gradient(145deg, #ffffff 0%, #f7f7f8 35%, #e3e3e6 75%, #ffffff 100%);
    opacity: 0;
    box-shadow: 
        0 45px 100px rgba(0,0,0,0.7),
        0 10px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,1),
        inset 0 -1.5px 3px rgba(0,0,0,0.06);
    overflow: hidden;
    z-index: 2;
}

.stroke {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 592px;
    height: 432px;
    border-radius: 34px;
    border: 2px dashed rgba(255, 255, 255, 0.45);
    transform: translate(-50%, -50%) scale(0.95);
    opacity: 0;
    box-shadow: 0 30px 80px rgba(0,0,0,0.65);
    z-index: 1;
}

.card-content {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
}

.card-info {
    position: absolute;
    left: 45px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: all 1.5s cubic-bezier(.22,1,.36,1);
    color: #374151;
    width: calc(100% - 220px);
}

.info-row {
    font-size: calc(17px * var(--card-text-scale-multiplier));
    letter-spacing: 0.5px;
    line-height: 1.4;
}

.info-row.name {
    font-size: calc(27px * var(--card-text-scale-multiplier));
    color: #111111;
    margin-bottom: 4px;
    letter-spacing: 0.8px;
    font-weight: 800;
}

.info-row strong {
    font-weight: 600;
    color: #111111;
}

.card-qr {
    position: absolute;
    right: 45px;
    top: 50%;
    transform: translateY(-50%);
    width: 135px;
    height: 135px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 
        0 12px 30px rgba(0,0,0,0.12), 
        inset 0 0 0 2px rgba(0,0,0,0.04);
    transition: all 1.5s cubic-bezier(.22,1,.36,1);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
}

/* Portrait Layout Shift Overrides */
.card.is-portrait .card-info {
    left: 50%;
    top: 68%;
    transform: translate(-50%, -50%);
    text-align: center;
    align-items: center;
    width: 90%;
    gap: 14px;
}

.card.is-portrait .card-qr {
    right: 50%;
    top: 30%;
    transform: translate(50%, -50%);
    width: 155px;
    height: 155px;
}

/* Centered Unified Typography Block Container */
.text-group {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 650px;
    max-width: 92%;
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* Perfectly left-aligned internal layout */
    gap: 16px; /* Space between Title and Text Info */
    transition: top 1.5s cubic-bezier(.22,1,.36,1);
    z-index: 15;
}

.title {
    color: #ffffff;
    letter-spacing: 10px;
    font-size: calc(30px * var(--text-scale-multiplier));
    font-weight: 300;
    opacity: 0;
    text-transform: uppercase;
    text-shadow: 0 4px 20px rgba(0,0,0,0.95);
    transition: opacity 0.6s ease;
    white-space: nowrap;
    text-align: left;
}

.description {
    color: var(--muted-white);
    font-size: calc(17px * var(--text-scale-multiplier));
    font-weight: 300;
    letter-spacing: 0.5px;
    opacity: 0;
    width: 100%;
    line-height: 1.6;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95);
    transition: opacity 0.6s ease;
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* Keeps multi-line notes structurally left-aligned */
    gap: 10px;
}

.desc-line {
    margin-bottom: 0px;
    text-align: left;
}

.adv { 
    color: var(--adv-color); 
    font-weight: 700; 
    margin-right: 6px; 
    letter-spacing: 1.5px;
}

.disadv { 
    color: var(--disadv-color); 
    font-weight: 700; 
    margin-right: 6px; 
    letter-spacing: 1.5px;
}

.measure {
    position: absolute;
    opacity: 0;
    transition: opacity 0.6s;
    z-index: 5;
}

.h-line {
    height: 2px;
    background: var(--cyan);
    transform-origin: center;
    transform: scaleX(0);
    box-shadow: 0 0 10px rgba(125, 249, 255, 0.5);
}

.v-line {
    width: 2px;
    background: var(--cyan);
    transform-origin: center;
    transform: scaleY(0);
    box-shadow: 0 0 10px rgba(125, 249, 255, 0.5);
}

.label {
    position: absolute;
    color: var(--cyan);
    font-size: calc(23px * var(--text-scale-multiplier));
    font-weight: 600;
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.95);
    white-space: nowrap;
}
</style>
</head>
<body>

<div class="vignette"></div>

<div class="scale-container" id="scaleContainer">
    <div class="wrapper" id="wrapper">
        <div class="card-glow" id="cardGlow"></div>
        <div class="stroke" id="stroke"></div>
        
        <div class="card" id="card">
            <div class="card-content" id="cardContent">
                <div class="card-info">
                    <div class="info-row name">Tony Stark</div>
                    <div class="info-row"><strong>QR Number:</strong> 000-000-000</div>
                    <div class="info-row"><strong>L:</strong> Emerald &nbsp;&nbsp;|&nbsp;&nbsp; <strong>D:</strong> Diamond Palace</div>
                    <div class="info-row"><strong>PG:</strong> 1-1</div>
                </div>
                <div class="card-qr">
                    <svg viewBox="0 0 100 100" fill="#111" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M10 10H35V35H10V10ZM15 15V30H30V15H15Z" />
                        <rect x="20" y="20" width="5" height="5" />
                        
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M65 10H90V35H65V10ZM70 15V30H85V15H70Z" />
                        <rect x="75" y="20" width="5" height="5" />
                        
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M10 65H35V90H10V65ZM15 70V85H30V70H15Z" />
                        <rect x="20" y="75" width="5" height="5" />

                        <rect x="45" y="10" width="10" height="5" />
                        <rect x="40" y="20" width="15" height="5" />
                        <rect x="45" y="30" width="10" height="10" />
                        
                        <rect x="10" y="45" width="15" height="10" />
                        <rect x="30" y="45" width="5" height="15" />
                        <rect x="40" y="50" width="20" height="5" />
                        <rect x="65" y="45" width="10" height="15" />
                        <rect x="80" y="40" width="10" height="10" />
                        <rect x="85" y="55" width="5" height="15" />

                        <rect x="40" y="65" width="15" height="5" />
                        <rect x="45" y="75" width="10" height="15" />
                        <rect x="60" y="65" width="5" height="25" />
                        <rect x="70" y="75" width="20" height="5" />
                        <rect x="75" y="85" width="15" height="5" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="measure" id="widthMeasure">
            <div class="h-line" id="hLine"></div>
            <div class="label" id="widthLabel"></div>
        </div>

        <div class="measure" id="heightMeasure">
            <div class="v-line" id="vLine"></div>
            <div class="label" id="heightLabel"></div>
        </div>

        <!-- Integrated Text Group Wrapper -->
        <div class="text-group" id="textGroup">
            <div class="title" id="title"></div>
            <div class="description" id="description"></div>
        </div>
    </div>
</div>

<script>
const card = document.getElementById("card");
const cardContent = document.getElementById("cardContent");
const stroke = document.getElementById("stroke");
const cardGlow = document.getElementById("cardGlow");
const textGroup = document.getElementById("textGroup");
const title = document.getElementById("title");
const description = document.getElementById("description");
const hLine = document.getElementById("hLine");
const vLine = document.getElementById("vLine");
const widthMeasure = document.getElementById("widthMeasure");
const heightMeasure = document.getElementById("heightMeasure");
const widthLabel = document.getElementById("widthLabel");
const heightLabel = document.getElementById("heightLabel");
const wrapper = document.getElementById("wrapper");
const scaleContainer = document.getElementById("scaleContainer");

let currentCardWidth = 560;
let currentCardHeight = 400;

function wait(ms){
    return new Promise(r => setTimeout(r, ms));
}

function updateScale() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    
    const paddingFactor = screenWidth < 768 ? 0.98 : 0.95; 
    let scale = Math.min((screenWidth * paddingFactor) / 1000, (screenHeight * paddingFactor) / 850);
    
    const maxScale = screenWidth < 768 ? 1.25 : 1.45;
    scale = Math.min(scale, maxScale);
    
    scaleContainer.style.transform = `scale(${scale})`;
    
    let globalMultiplier = 1.0;
    let cardMultiplier = 1.0;
    
    if (scale < 1.0) {
        globalMultiplier = Math.max(1.0, 1.0 / Math.pow(scale, 0.75));
        cardMultiplier = Math.max(1.0, 1.0 / Math.pow(scale, 0.45));
    }
    
    document.documentElement.style.setProperty('--text-scale-multiplier', globalMultiplier);
    document.documentElement.style.setProperty('--card-text-scale-multiplier', cardMultiplier);
}

function updateMeasurements(){
    const wrapW = 1000;
    const wrapH = 850;
    
    const leftOffset = (wrapW - currentCardWidth) / 2;
    const topOffset = (wrapH - currentCardHeight) / 2;

    widthMeasure.style.left = leftOffset + "px";
    widthMeasure.style.top = (topOffset - 65) + "px";
    hLine.style.width = currentCardWidth + "px";

    widthLabel.style.left = "50%";
    widthLabel.style.top = "-45px";
    widthLabel.style.transform = "translateX(-50%)";

    heightMeasure.style.left = (leftOffset - 65) + "px";
    heightMeasure.style.top = topOffset + "px";
    vLine.style.height = currentCardHeight + "px";

    heightLabel.style.left = "-25px";
    heightLabel.style.top = "50%";
    heightLabel.style.transform = "translate(-100%, -50%) rotate(-90deg)";
}

function togglePortraitMode(isPortrait) {
    const isMobile = window.innerWidth < 768;
    if (isPortrait) {
        card.classList.add('is-portrait');
        // Elegant spacing coordinates away from bounding layout box limits
        textGroup.style.top = isMobile ? "710px" : "695px";
    } else {
        card.classList.remove('is-portrait');
        textGroup.style.top = isMobile ? "670px" : "655px";
    }
}

async function showMeasure(w, h){
    updateMeasurements();
    widthLabel.innerHTML = w;
    heightLabel.innerHTML = h;
    widthMeasure.style.opacity = 1;
    heightMeasure.style.opacity = 1;
    await wait(50);
    hLine.style.transition = "1s cubic-bezier(.22,1,.36,1)";
    vLine.style.transition = "1s cubic-bezier(.22,1,.36,1)";
    hLine.style.transform = "scaleX(1)";
    vLine.style.transform = "scaleY(1)";
}

async function hideMeasure(){
    hLine.style.transform = "scaleX(0)";
    vLine.style.transform = "scaleY(0)";
    await wait(600);
    widthMeasure.style.opacity = 0;
    heightMeasure.style.opacity = 0;
}

async function showText(text, desc){
    title.innerHTML = text;
    description.innerHTML = desc;
    title.style.opacity = 1;
    description.style.opacity = 1;
}

async function hideText(){
    title.style.opacity = 0;
    description.style.opacity = 0;
}

async function resizeCard(w, h){
    currentCardWidth = w;
    currentCardHeight = h;
    card.style.width = w + "px";
    card.style.height = h + "px";
    
    cardGlow.style.width = w + "px";
    cardGlow.style.height = h + "px";
    
    await wait(1400);
    updateMeasurements();
}

async function run(){
    while(true){
        wrapper.style.transition = "none";
        wrapper.style.opacity = 1;
        wrapper.style.transform = "scale(1)";

        currentCardWidth = 560;
        currentCardHeight = 400;

        card.style.transition = "none";
        card.style.width = "560px";
        card.style.height = "400px";
        card.style.opacity = 0;
        card.style.transform = "translate(-50%,-50%) scale(0.2)";
        
        cardGlow.style.transition = "none";
        cardGlow.style.width = "560px";
        cardGlow.style.height = "400px";
        cardGlow.style.opacity = 0;
        cardGlow.style.transform = "translate(-50%,-50%) scale(0.2)";

        cardContent.style.opacity = 0;

        togglePortraitMode(false);

        stroke.style.opacity = 0;
        title.style.opacity = 0;
        description.style.opacity = 0;

        widthMeasure.style.opacity = 0;
        heightMeasure.style.opacity = 0;
        hLine.style.transform = "scaleX(0)";
        vLine.style.transform = "scaleY(0)";

        await wait(600);

        /* 1. ORIGINAL */
        card.style.transition = "all 1.4s cubic-bezier(.22,1,.36,1)";
        cardGlow.style.transition = "all 1.4s cubic-bezier(.22,1,.36,1)";
        
        card.style.opacity = 1;
        card.style.transform = "translate(-50%,-50%) scale(1)";
        cardGlow.style.opacity = 1;
        cardGlow.style.transform = "translate(-50%,-50%) scale(1)";
        
        await wait(800);
        cardContent.style.opacity = 1; 
        await wait(700);

        await showMeasure('3.5"', '2.5"');
        await showText(
            "ORIGINAL", 
            `<div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Too bulky to easily fit inside modern pockets or wallets</div>
             <div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Impractical and cumbersome for continuous daily carry</div>`
        );

        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        /* 2. LAMINATED */
        stroke.style.transition = "all 1.2s cubic-bezier(.22,1,.36,1)";
        stroke.style.opacity = 1;
        stroke.style.transform = "translate(-50%,-50%) scale(1)";

        await wait(1200);

        await showMeasure('3.7"', '2.7"');
        await showText(
            "LAMINATED", 
            `<div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Significantly larger dimensions with rigid protective edges</div>
             <div class="desc-line"><span class="disadv">✖ DISADVANTAGE:</span> Exceptionally difficult to fit into standard compartments</div>`
        );

        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        stroke.style.opacity = 0;

        /* 3. NEW DESIGN INTRODUCTION */
        await showText(
            "NEW DESIGN", 
            `<div class="desc-line" style="color: white; font-weight: 400;">Sleeker dimensions engineered for effortless everyday portability</div>`
        );
        await wait(2500);
        await hideText();
        await wait(800); 

        /* 4. POCKET LANDSCAPE */
        card.style.transition = "all 1.5s cubic-bezier(.22,1,.36,1)";
        await resizeCard(480, 320);

        await showMeasure('3"', '2"');
        await showText(
            "POCKET LANDSCAPE", 
            `<div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Perfectly compact, lightweight, and balanced design</div>
             <div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Slips smoothly into any standard wallet or hand carry</div>`
        );
        await wait(4500);

        await hideMeasure();
        await wait(400);
        await hideText();
        await wait(800);

        /* 5. POCKET PORTRAIT */
        togglePortraitMode(true); 
        await resizeCard(320, 480);

        await showMeasure('2"', '3"');
        await showText(
            "POCKET PORTRAIT", 
            `<div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Incredibly sleek and ergonomic portrait orientation</div>
             <div class="desc-line"><span class="adv">✔ ADVANTAGE:</span> Fits flawlessly inside minimalist cardholders and small pockets</div>`
        );

        await wait(5000);

        await hideMeasure();
        await wait(500);
        await hideText();
        await wait(500);

        /* Cinematic fading exit */
        wrapper.style.transition = "all 2.5s cubic-bezier(.22,1,.36,1)";
        wrapper.style.transform = "scale(.35)";
        wrapper.style.opacity = 0;

        await wait(3000);
    }
}

window.addEventListener("resize", updateScale);
updateScale();
run();

</script>

</body>
</html>
